repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
        # tests/data/ holds JSON fixtures that test code overwrites via
        # ``json.dump`` (no trailing newline). The fixer "fixed" them on
        # every CI run, failing the build over generated noise. Skip them.
        exclude: ^tests/data/.*\.json$
      - id: trailing-whitespace
        exclude: ^tests/data/.*\.json$
  - repo: https://github.com/pypa/pip-audit
    rev: v2.9.0
    hooks:
      - id: pip-audit
        additional_dependencies: ["pip-audit[cyclonedx]", "cyclonedx-bom"]
        args: ["-r", "requirements.txt", "--format", "columns"]
